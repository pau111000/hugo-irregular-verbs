<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light &amp; Sound Review - Hugo's Science Exam</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ch1: #ff6b6b; --ch2: #ffa502; --ch3: #2ed573; --ch4: #1e90ff;
    --ch5: #a855f7; --ch6: #ff6348; --ch7: #ff4757; --ch8: #3742fa;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #f0f0f0;
    min-height: 100vh;
    font-size: 18px;
    line-height: 1.65;
    overflow-x: hidden;
  }

  /* ---- Animated SVG wave header ---- */
  .wave-header {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
    background: linear-gradient(90deg, #00b4db, #0083b0, #00b894);
  }
  .wave-header svg {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 80px;
    animation: waveSlide 6s linear infinite;
  }
  @keyframes waveSlide {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .wave-header h1 {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 30px;
    font-size: 2.2rem;
    text-shadow: 2px 3px 6px rgba(0,0,0,.4);
  }
  .wave-header p {
    text-align: center;
    position: relative;
    z-index: 2;
    font-size: 1.1rem;
    opacity: .9;
  }

  /* ---- Progress bar ---- */
  .progress-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,12,41,.92);
    backdrop-filter: blur(8px);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid rgba(255,255,255,.1);
  }
  .progress-wrap span { font-weight: 700; font-size: 1rem; white-space: nowrap; }
  .progress-bar-bg {
    flex: 1;
    height: 18px;
    background: rgba(255,255,255,.15);
    border-radius: 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00b894, #00cec9, #6c5ce7);
    border-radius: 12px;
    transition: width .6s ease;
  }
  .progress-pct { min-width: 48px; text-align: right; font-weight: 700; }

  /* ---- Chapter dots nav ---- */
  .chapter-dots {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    padding: 14px 10px 6px;
  }
  .chapter-dots button {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.1);
    color: #fff;
    font-weight: 700;
    font-size: .9rem;
    cursor: pointer;
    transition: .3s;
    position: relative;
  }
  .chapter-dots button.done {
    border-color: #2ed573;
    background: #2ed573;
    color: #000;
  }
  .chapter-dots button.done::after {
    content: ''; position: absolute; top: -2px; right: -2px;
    font-size: .7rem;
  }

  /* ---- Brain Break button ---- */
  .brain-break-btn {
    display: block;
    margin: 16px auto;
    padding: 12px 28px;
    background: linear-gradient(135deg, #f9ca24, #f0932b);
    color: #000;
    border: none;
    border-radius: 30px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(249,202,36,.4);
    transition: transform .2s;
  }
  .brain-break-btn:hover { transform: scale(1.06); }

  /* ---- Modal ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: linear-gradient(135deg, #2d3436, #636e72);
    padding: 32px 28px;
    border-radius: 20px;
    max-width: 440px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,.5);
    animation: popIn .35s ease;
  }
  @keyframes popIn { 0%{transform:scale(.7);opacity:0} 100%{transform:scale(1);opacity:1} }
  .modal-box h3 { font-size: 1.4rem; margin-bottom: 14px; }
  .modal-box p { font-size: 1.1rem; margin-bottom: 20px; }
  .modal-box button {
    padding: 10px 30px;
    border: none;
    border-radius: 20px;
    background: #6c5ce7;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* ---- Chapters ---- */
  .chapters { max-width: 860px; margin: 0 auto; padding: 10px 16px 60px; }

  .chapter-card {
    margin-bottom: 22px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 25px rgba(0,0,0,.35);
    transition: box-shadow .3s;
  }
  .chapter-card:hover { box-shadow: 0 8px 35px rgba(0,0,0,.5); }

  .chapter-header {
    padding: 18px 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    user-select: none;
    transition: .3s;
    position: relative;
  }
  .chapter-header:hover { filter: brightness(1.08); }
  .ch-emoji { font-size: 2rem; }
  .ch-title { flex: 1; font-size: 1.25rem; font-weight: 700; }
  .ch-toggle {
    font-size: 1.6rem;
    transition: transform .4s;
  }
  .chapter-card.open .ch-toggle { transform: rotate(180deg); }
  .ch-check {
    font-size: 1.4rem;
    display: none;
  }
  .chapter-card.completed .ch-check { display: inline; }

  .chapter-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .5s ease;
    background: rgba(0,0,0,.25);
  }
  .chapter-card.open .chapter-body {
    max-height: 8000px;
  }
  .chapter-content {
    padding: 22px 22px 10px;
  }
  .chapter-content h3 {
    font-size: 1.15rem;
    margin: 18px 0 8px;
    color: #ffeaa7;
  }
  .chapter-content ul {
    padding-left: 22px;
    margin-bottom: 10px;
  }
  .chapter-content li {
    margin-bottom: 6px;
  }

  /* Did-you-know boxes */
  .dyk {
    background: linear-gradient(135deg, rgba(108,92,231,.25), rgba(0,206,201,.25));
    border-left: 4px solid #6c5ce7;
    border-radius: 10px;
    padding: 14px 16px;
    margin: 14px 0;
    cursor: pointer;
    position: relative;
  }
  .dyk-label {
    font-weight: 700;
    color: #a29bfe;
  }
  .dyk-text { display: none; margin-top: 8px; }
  .dyk.open .dyk-text { display: block; animation: fadeIn .4s; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  /* ---- Diagrams ---- */
  .diagram-wrap {
    background: rgba(255,255,255,.07);
    border-radius: 14px;
    padding: 18px;
    margin: 16px 0;
    text-align: center;
    overflow-x: auto;
  }
  .diagram-wrap svg { max-width: 100%; height: auto; }
  .diagram-caption {
    font-size: .95rem;
    color: #dfe6e9;
    margin-top: 8px;
    font-style: italic;
  }

  /* Wave animation */
  .wave-anim-line {
    animation: drawWave 2s ease-in-out infinite alternate;
  }
  @keyframes drawWave {
    0% { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: 40; }
  }

  /* ---- Quiz section ---- */
  .quiz-section {
    background: rgba(255,255,255,.08);
    border-radius: 14px;
    padding: 20px;
    margin-top: 20px;
  }
  .quiz-section h3 {
    color: #fdcb6e;
    margin-bottom: 14px;
    font-size: 1.15rem;
  }
  .quiz-q {
    margin-bottom: 18px;
  }
  .quiz-q p {
    font-weight: 600;
    margin-bottom: 8px;
  }
  .quiz-q label {
    display: block;
    padding: 10px 14px;
    margin: 4px 0;
    border-radius: 10px;
    background: rgba(255,255,255,.08);
    cursor: pointer;
    transition: .25s;
    border: 2px solid transparent;
  }
  .quiz-q label:hover { background: rgba(255,255,255,.15); }
  .quiz-q label.correct {
    background: rgba(46,213,115,.3);
    border-color: #2ed573;
  }
  .quiz-q label.wrong {
    background: rgba(255,71,87,.25);
    border-color: #ff4757;
  }
  .quiz-q input[type=radio] { display: none; }
  .quiz-result {
    font-weight: 700;
    margin-top: 10px;
    min-height: 28px;
  }
  .quiz-result.pass { color: #2ed573; }
  .quiz-result.fail { color: #ff6b6b; }

  .quiz-check-btn {
    padding: 10px 26px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: transform .2s;
  }
  .quiz-check-btn:hover { transform: scale(1.04); }

  /* ---- Confetti ---- */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 300;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    top: -20px;
    animation: confettiFall 2.5s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ---- Summary section ---- */
  .summary-section {
    max-width: 860px;
    margin: 30px auto;
    padding: 0 16px 80px;
  }
  .summary-section h2 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #f9ca24, #f0932b, #eb4d4b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .summary-card {
    background: rgba(255,255,255,.1);
    border-radius: 14px;
    padding: 16px 18px;
    border-left: 4px solid;
    transition: transform .2s;
  }
  .summary-card:hover { transform: translateY(-3px); }
  .summary-card h4 { font-size: 1rem; margin-bottom: 6px; }
  .summary-card p { font-size: .95rem; color: #dfe6e9; }
  .es { display: block; font-size: 0.78rem; color: #a0a0b0; font-style: italic; margin-top: 3px; line-height: 1.4; }
  .es::before { content: "🇪🇸 "; }
  .chapter-content li .es { margin-top: 1px; margin-bottom: 4px; }

  /* ---- Responsive ---- */
  @media (max-width: 600px) {
    .wave-header h1 { font-size: 1.5rem; padding-top: 24px; }
    .chapter-header { padding: 14px 16px; }
    .ch-title { font-size: 1.1rem; }
    .chapter-content { padding: 16px; }
    body { font-size: 16px; }
    .summary-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ===== WAVE HEADER ===== -->
<div class="wave-header">
  <h1>&#127919; Hugo's Light &amp; Sound Review &#127919;</h1>
  <p>Your interactive study guide - let's ace this exam!</p>
  <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
    <path fill="rgba(15,12,41,.95)" d="M0,40 C360,80 720,0 1080,40 C1260,60 1380,20 1440,40 L1440,80 L0,80 Z
      M1440,40 C1800,80 2160,0 2520,40 C2700,60 2820,20 2880,40 L2880,80 L1440,80 Z"/>

<!-- ===== PROGRESS BAR ===== -->
<div class="progress-wrap">
  <span>&#128218; Progress:</span>

  <span class="progress-pct" id="progressPct">0%</span>
</div>

<!-- ===== CHAPTER DOTS ===== -->
<div class="chapter-dots" id="chapterDots"></div>

<!-- ===== BRAIN BREAK ===== -->

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">

    <p id="modalText"></p>
    <button onclick="closeModal()">Got it!</button>
  </div>
</div>

<!-- ===== CONFETTI CONTAINER ===== -->
<div class="confetti-container" id="confettiBox"></div>

<!-- ===== CHAPTERS ===== -->
<div class="chapters" id="chaptersContainer"></div>

<!-- ===== SUMMARY ===== -->
<div class="summary-section">
  <h2>&#9889; Quick-Review Summary Cards &#9889;</h2>
  <div class="summary-grid" id="summaryGrid"></div>
</div>

const chapters = [
  {
    id: 1, emoji: "&#9728;&#65039;", title: "Light as Energy",
    color: "#ff6b6b",
    content: `
      <h3>What is Light?</h3>
      <ul>
        <li><strong>Light is energy</strong> - it is nature's way of transferring energy from one place to another.<span class="es">La luz es energía – es la forma en que la naturaleza transfiere energía de un lugar a otro.</span></li>
        <li>Light travels insanely fast: <strong>186,262 miles per second!</strong><span class="es">La luz viaja súper rápido: ¡186.262 millas por segundo!</span></li>
        <li>A <strong>light year</strong> is the distance light travels in one whole year = <strong>5.8 trillion miles</strong>.<span class="es">Un año luz es la distancia que la luz recorre en un año = 5.8 billones de millas.</span></li>

        <li>You can do three things with light: <strong>block it</strong>, <strong>reflect it</strong>, or <strong>refract it</strong> (bend it).<span class="es">Puedes hacer tres cosas con la luz: bloquearla, reflejarla o refractarla (doblarla).</span></li>
      </ul>
    `,
    dyk: { label: "&#128161; Did You Know?", text: "If you could travel at the speed of light, you could go around the Earth 7.5 times in just ONE second!" },

      <div class="diagram-wrap">
        <svg viewBox="0 0 400 140" width="400">
          <defs>
            <marker id="arrowY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ffeaa7"/></marker>
          </defs>
          <line x1="30" y1="70" x2="370" y2="70" stroke="#ffeaa7" stroke-width="3" marker-end="url(#arrowY)" stroke-dasharray="12 6"/>
          <text x="200" y="60" fill="#ffeaa7" font-size="14" text-anchor="middle" font-weight="bold">Light travels in a straight line</text>
          <circle cx="20" cy="70" r="14" fill="#f9ca24"/>

  {

  { title: "Frequency", text: "Waves per second, measured in Hertz (Hz).", es: "Frecuencia – Ondas por segundo, en Hertz (Hz).", color: "#ff6348" },
  { title: "Pitch", text: "High or low sound; determined by frequency.", es: "Tono – Agudo o grave; determinado por la frecuencia.", color: "#ff4757" },
  { title: "Loudness", text: "How strong; determined by amplitude (wave height).", es: "Volumen – Qué tan fuerte; determinado por la amplitud.", color: "#ff4757" },
  { title: "Timbre", text: "Tone quality - why guitar and piano sound different on same note.", es: "Timbre – Cualidad del sonido; por qué guitarra y piano suenan diferente.", color: "#ff4757" },
  { title: "Echo", text: "Sound bouncing off hard surfaces. Used in echolocation (bats, dolphins).", es: "Eco – Sonido rebotando en superficies duras. Ecolocalización.", color: "#3742fa" },
  { title: "Noise Pollution", text: "Harmful sounds causing hearing damage, stress, sleep problems.", es: "Contaminación acústica – Sonidos dañinos que causan daño auditivo y estrés.", color: "#3742fa" },
];

/* ============================================================
   STATE
   ============================================================ */
const completedChapters = new Set();

/* ============================================================
   RENDER
   ============================================================ */
function renderChapterDots() {
  const wrap = document.getElementById('chapterDots');
  wrap.innerHTML = chapters.map(ch =>
    `<button id="dot${ch.id}" onclick="scrollToChapter(${ch.id})" title="Chapter ${ch.id}: ${ch.title}">${ch.id}</button>`
  ).join('');
}

function renderChapters() {
  const container = document.getElementById('chaptersContainer');
  container.innerHTML = chapters.map(ch => {
    let quizHTML = '';
    if (ch.quiz && ch.quiz.length) {
      quizHTML = `<div class="quiz-section">
        <h3>&#127919; Quick Quiz - Check Yourself!</h3>
        ${ch.quiz.map((q, qi) => `
          <div class="quiz-q" data-ch="${ch.id}" data-qi="${qi}" data-ans="${q.ans}">
            <p>${qi + 1}. ${q.q}</p>
            ${q.opts.map((o, oi) => `
              <label data-oi="${oi}" onclick="selectAnswer(this, ${ch.id}, ${qi}, ${oi})">
                <input type="radio" name="ch${ch.id}q${qi}" value="${oi}"> ${o}
              </label>
            `).join('')}
          </div>
        `).join('')}
        <button class="quiz-check-btn" onclick="checkQuiz(${ch.id})">Check My Answers!</button>
        <div class="quiz-result" id="quizResult${ch.id}"></div>
      </div>`;
    }
    return `
    <div class="chapter-card" id="chapter${ch.id}">
      <div class="chapter-header" style="background:linear-gradient(135deg, ${ch.color}, ${ch.color}99)" onclick="toggleChapter(${ch.id})">
        <span class="ch-emoji">${ch.emoji}</span>
        <span class="ch-title">Chapter ${ch.id}: ${ch.title}</span>
        <span class="ch-check">&#9989;</span>
        <span class="ch-toggle">&#9660;</span>
      </div>
      <div class="chapter-body">
        <div class="chapter-content">
          ${ch.content}
          ${ch.dyk ? `
            <div class="dyk" onclick="this.classList.toggle('open')">
              <span class="dyk-label">${ch.dyk.label} (tap to reveal)</span>
              <div class="dyk-text">${ch.dyk.text}</div>
            </div>
          ` : ''}
          ${ch.diagram || ''}
          ${quizHTML}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderSummary() {
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = summaryFacts.map(f =>
    `<div class="summary-card" style="border-left-color:${f.color}"><h4>${f.title}</h4><p>${f.text}<span class="es">${f.es}</span></p></div>`
  ).join('');
}

/* ============================================================
   INTERACTIONS
   ============================================================ */
function toggleChapter(id) {
  const card = document.getElementById('chapter' + id);
  const isOpen = card.classList.contains('open');
  // Close all
  document.querySelectorAll('.chapter-card').forEach(c => c.classList.remove('open'));
  if (!isOpen) {
    card.classList.add('open');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
}

function scrollToChapter(id) {
  const card = document.getElementById('chapter' + id);
  card.classList.add('open');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function selectAnswer(label, chId, qi, oi) {
  // Clear previous selection styling in this question
  const qDiv = label.closest('.quiz-q');
  qDiv.querySelectorAll('label').forEach(l => { l.classList.remove('correct','wrong'); });
}

function checkQuiz(chId) {
  const ch = chapters.find(c => c.id === chId);
  let correct = 0;
  ch.quiz.forEach((q, qi) => {
    const qDiv = document.querySelector(`.quiz-q[data-ch="${chId}"][data-qi="${qi}"]`);
    const selected = qDiv.querySelector('input:checked');
    qDiv.querySelectorAll('label').forEach(l => l.classList.remove('correct','wrong'));
    // Always show the correct answer
    const correctLabel = qDiv.querySelector(`label[data-oi="${q.ans}"]`);
    correctLabel.classList.add('correct');
    if (selected) {
      const val = parseInt(selected.value);
      if (val === q.ans) {
        correct++;
      } else {
        selected.closest('label').classList.add('wrong');
      }
    }
  });
  const result = document.getElementById('quizResult' + chId);
  const total = ch.quiz.length;
  if (correct === total) {
    result.className = 'quiz-result pass';
    result.innerHTML = `&#127881; Perfect! ${correct}/${total} - You nailed it!`;
    markComplete(chId);
  } else {
    result.className = 'quiz-result fail';
    result.innerHTML = `${correct}/${total} correct. Review the green answers and try again!`;
  }
}

function markComplete(chId) {
  if (completedChapters.has(chId)) return;
  completedChapters.add(chId);
  const card = document.getElementById('chapter' + chId);
  card.classList.add('completed');
  const dot = document.getElementById('dot' + chId);
  if (dot) dot.classList.add('done');
  updateProgress();
  launchConfetti();
}

function updateProgress() {
  const pct = Math.round((completedChapters.size / chapters.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  if (pct === 100) {
    setTimeout(() => {
      openModal("&#127942; YOU DID IT! &#127942;", "Hugo, you reviewed ALL 8 chapters! You are ready to crush that exam! Go get that A+!");
      launchConfetti(); launchConfetti();
    }, 600);
  }
}

/* ---- Brain Break ---- */
let bbIndex = 0;
function showBrainBreak() {
  const bb = brainBreaks[bbIndex % brainBreaks.length];
  bbIndex++;
  openModal(bb.title, bb.text);
}

/* ---- Modal ---- */
function openModal(title, text) {
  document.getElementById('modalTitle').innerHTML = title;
  document.getElementById('modalText').innerHTML = text;
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

/* ---- Confetti ---- */
function launchConfetti() {
  const box = document.getElementById('confettiBox');
  const colors = ['#ff6b6b','#ffa502','#2ed573','#1e90ff','#a855f7','#f9ca24','#ff4757','#00cec9'];
  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 6) + 'px';
    piece.style.height = (Math.random() * 8 + 6) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    box.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

/* ============================================================
   INIT
   ============================================================ */
renderChapterDots();
renderChapters();
renderSummary();
</script>
</body>
</html>
